<!DOCTYPE html>
<html>

<head>
  <title>
    {% block title %}{% endblock %}
  </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

  <div class="py-3 px-3">
    <h1 class="pb-3" style="color:oklch(0.5 0.1 270)">by the light rail</h1>
    <div>
      {% block content %}{% endblock %}
    </div>
  </div>
  <footer class="d-flex flex-row justify-content-start navbar bg-dark fixed-bottom py-3">
    <li class="nav-item px-4">
      <a class="text-decoration-none nav-link" style="color: white" href="/">search</a>
    </li>
    <li class="nav-item px-4">
      <a class="text-decoration-none nav-link" style="color: white" href="about">about</a>
    </li>
  </footer>
</body>

</html>
